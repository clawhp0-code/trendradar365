name: Daily Auto Post

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'NODEJS_SCRIPT'
          const https = require("https");
          const http = require("http");
          const fs = require("fs");
          const path = require("path");
          const today = new Date().toISOString().split("T")[0];

          const prompt = `오늘(${today}) 기준으로 전 세계에서 가장 트렌딩한 소비자 제품 3개를 소개해주세요.\n각 제품을 아래 구분자 형식으로 작성해주세요.\n\n===PRODUCT===\nSLUG: ${today}-product-slug-here\nTITLE: 제품명\nCATEGORY: 테크\nTHUMBNAIL: https://images.unsplash.com/photo-XXXXXXXXXX?w=800\nPRICE_URL: https://제조사공식사이트/제품페이지\nBUYLINK: https://구매링크\nSUMMARY: 2-3문장의 한국어 요약\nCONTENT:\n## 제품 상세\n본문 최소 300자 한국어\n===END===\n\n규칙: CATEGORY는 테크 또는 라이프스타일, SLUG는 영문소문자+하이픈, 3개 제품 각각 작성, 서로 다른 분야`;

          function callClaude(p) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 4096, messages: [{ role: "user", content: p }] });
              const req = https.request({ hostname: "api.anthropic.com", path: "/v1/messages", method: "POST", headers: { "Content-Type": "application/json", "x-api-key": process.env.ANTHROPIC_API_KEY, "anthropic-version": "2023-06-01", "Content-Length": Buffer.byteLength(body) } }, (res) => {
                let data = "";
                res.on("data", c => data += c);
                res.on("end", () => { try { const r = JSON.parse(data); r.content ? resolve(r.content[0].text) : reject(new Error(data)); } catch(e) { reject(e); } });
              });
              req.on("error", reject); req.write(body); req.end();
            });
          }

          function fetchPrice(url) {
            return new Promise((resolve) => {
              if (!url || !url.startsWith("http")) return resolve(null);
              const t = setTimeout(() => resolve(null), 8000);
              try {
                const p = new URL(url);
                const c = url.startsWith("https") ? https : http;
                const req = c.request({ hostname: p.hostname, path: p.pathname + p.search, method: "GET", headers: { "User-Agent": "Mozilla/5.0", "Accept-Language": "ko-KR,ko;q=0.9" } }, (res) => {
                  if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) { clearTimeout(t); return fetchPrice(res.headers.location).then(resolve); }
                  let html = "";
                  res.on("data", c => html += c);
                  res.on("end", () => {
                    clearTimeout(t);
                    const m = html.match(/₩[\d,]+/g);
                    if (m) { const prices = m.map(x => parseInt(x.replace(/[₩,]/g,""))).filter(x => x > 10000); if (prices.length) return resolve("₩" + prices[0].toLocaleString("ko-KR")); }
                    resolve(null);
                  });
                });
                req.on("error", () => { clearTimeout(t); resolve(null); }); req.end();
              } catch(e) { clearTimeout(t); resolve(null); }
            });
          }

          async function main() {
            const text = await callClaude(prompt);
            const blocks = text.split("===PRODUCT===").filter(b => b.includes("===END==="));
            if (!blocks.length) { console.error("No blocks found"); process.exit(1); }
            const dir = path.join(process.cwd(), "content/posts");
            if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
            let created = 0;
            for (const block of blocks) {
              const b = block.split("===END===")[0].trim();
              const f = (k) => { const m = b.match(new RegExp(`^${k}:(.*)`, "m")); return m ? m[1].trim() : ""; };
              const slug = f("SLUG"), title = f("TITLE"), category = f("CATEGORY"), thumbnail = f("THUMBNAIL"), priceUrl = f("PRICE_URL"), buyLink = f("BUYLINK"), summary = f("SUMMARY");
              const cm = b.match(/^CONTENT:\n([\s\S]+)$/m);
              const content = cm ? cm[1].trim() : "";
              if (!slug || !title) continue;
              const fp = path.join(dir, `${slug}.md`);
              if (fs.existsSync(fp)) { console.log("Skip:", slug); continue; }
              let price = await fetchPrice(priceUrl);
              if (!price) { const pr = await callClaude(`"${title}"의 한국 공식 정가를 ₩X,XXX,XXX 형식으로만 답해주세요.`); const pm = pr.match(/₩[\d,]+/); price = pm ? pm[0] : "가격 확인 필요"; }
              const md = ["---", `title: "${title.replace(/"/g,"'")}"`, `date: "${today}"`, `category: "${category}"`, `thumbnail: "${thumbnail}"`, `price: "${price}"`, `buyLink: "${buyLink}"`, `summary: "${summary.replace(/"/g,"'")}"`, "---", "", content, "", "---", "> 💡 위 가격은 공식 판매가(정가) 기준입니다. 실제 가격은 다를 수 있습니다."].join("\n");
              fs.writeFileSync(fp, md, "utf8");
              console.log(`Created: ${slug} (${price})`);
              created++;
            }
            console.log(`Done: ${created} posts`);
          }
          main().catch(e => { console.error(e.message); process.exit(1); });
          NODEJS_SCRIPT

      - name: Install & Build
        run: npm ci && npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy out --project-name=trendradar365 --branch=main

      - name: Commit posts
        run: |
          git config --global user.name "TrendRadar Bot"
          git config --global user.email "bot@trendradar365.com"
          git add content/posts/
          git diff --staged --quiet || git commit -m "🤖 Daily trend posts: $(date +'%Y-%m-%d')"
          git push || true
