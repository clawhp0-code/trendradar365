name: Daily Auto Post

on:
  schedule:
    - cron: "0 14 * * *" # 매일 14:00 UTC (한국시간 23:00)
  workflow_dispatch:

jobs:
  generate-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate trending posts via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'NODEJS_SCRIPT'
          const https = require("https");
          const fs = require("fs");
          const path = require("path");

          const today = new Date().toISOString().split("T")[0];

          const prompt = `오늘(${today}) 기준으로 전 세계에서 가장 트렌딩한 소비자 제품 3개를 소개해주세요.
각 제품을 아래 구분자를 이용한 형식으로 작성해주세요. JSON이 아닌 텍스트 형식으로 작성해주세요.

===PRODUCT===
SLUG: ${today}-product-slug-here
TITLE: 제품명 — 한 줄 캐치프레이즈
CATEGORY: 테크
THUMBNAIL: https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=800
PRICE: ₩299,000
BUYLINK: https://example.com
SUMMARY: 2-3문장의 한국어 요약입니다.
CONTENT:
## 제품 상세 내용

본문 마크다운 내용을 여기에 작성합니다. 이모지를 적절히 활용하세요. 최소 300자 이상 한국어로 작성해주세요.
===END===

규칙:
- CATEGORY는 "테크" 또는 "라이프스타일" 중 하나
- SLUG는 영문 소문자와 하이픈만 사용
- 3개의 제품을 ===PRODUCT=== 와 ===END=== 사이에 각각 작성
- 제품은 서로 다른 분야에서 선택`;

          const requestBody = JSON.stringify({
            model: "claude-opus-4-6",
            max_tokens: 4096,
            messages: [{ role: "user", content: prompt }],
          });

          const options = {
            hostname: "api.anthropic.com",
            path: "/v1/messages",
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": process.env.ANTHROPIC_API_KEY,
              "anthropic-version": "2023-06-01",
              "Content-Length": Buffer.byteLength(requestBody),
            },
          };

          const req = https.request(options, (res) => {
            let data = "";
            res.on("data", (chunk) => (data += chunk));
            res.on("end", () => {
              try {
                const response = JSON.parse(data);
                if (!response.content || !response.content[0]) {
                  console.error("Invalid API response:", data);
                  process.exit(1);
                }

                const text = response.content[0].text;
                console.log("Claude response received, length:", text.length);

                // Parse products using delimiter format
                const productBlocks = text.split("===PRODUCT===").filter(b => b.includes("===END==="));
                
                if (productBlocks.length === 0) {
                  console.error("No product blocks found in response");
                  console.error("Response:", text.substring(0, 500));
                  process.exit(1);
                }

                const postsDir = path.join(process.cwd(), "content", "posts");
                if (!fs.existsSync(postsDir)) {
                  fs.mkdirSync(postsDir, { recursive: true });
                }

                let created = 0;
                for (const block of productBlocks) {
                  const cleanBlock = block.split("===END===")[0].trim();
                  
                  const getField = (field) => {
                    const regex = new RegExp(`^${field}:(.*)`, "m");
                    const match = cleanBlock.match(regex);
                    return match ? match[1].trim() : "";
                  };

                  const slug = getField("SLUG");
                  const title = getField("TITLE");
                  const category = getField("CATEGORY");
                  const thumbnail = getField("THUMBNAIL");
                  const price = getField("PRICE");
                  const buyLink = getField("BUYLINK");
                  const summary = getField("SUMMARY");
                  
                  // Extract content after CONTENT: line
                  const contentMatch = cleanBlock.match(/^CONTENT:\n([\s\S]+)$/m);
                  const content = contentMatch ? contentMatch[1].trim() : "";

                  if (!slug || !title) {
                    console.log("Skipping incomplete product block");
                    continue;
                  }

                  const filePath = path.join(postsDir, `${slug}.md`);
                  if (fs.existsSync(filePath)) {
                    console.log(`Skipping existing: ${slug}`);
                    continue;
                  }

                  const frontmatter = [
                    "---",
                    `title: "${title.replace(/"/g, "'")}"`,
                    `date: "${today}"`,
                    `category: "${category}"`,
                    `thumbnail: "${thumbnail}"`,
                    `price: "${price}"`,
                    `buyLink: "${buyLink}"`,
                    `summary: "${summary.replace(/"/g, "'")}"`,
                    "---",
                    "",
                    content,
                  ].join("\n");

                  fs.writeFileSync(filePath, frontmatter, "utf8");
                  console.log(`Created: ${slug}.md`);
                  created++;
                }

                console.log(`Done: ${created} new posts created.`);
                if (created === 0) {
                  console.log("No new posts created - all may already exist");
                }
              } catch (err) {
                console.error("Error processing response:", err.message);
                process.exit(1);
              }
            });
          });

          req.on("error", (err) => {
            console.error("Request error:", err.message);
            process.exit(1);
          });

          req.write(requestBody);
          req.end();
          NODEJS_SCRIPT

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && git diff --staged --quiet && echo "no_changes=true" >> $GITHUB_OUTPUT || echo "no_changes=false" >> $GITHUB_OUTPUT

      - name: Commit and push new posts
        if: steps.changes.outputs.no_changes == 'false'
        run: |
          git config --global user.name "TrendRadar Bot"
          git config --global user.email "bot@trendradar365.com"
          git add content/posts/
          git commit -m "🤖 Daily trend posts: $(date +'%Y-%m-%d')"
          git push

      - name: No new posts
        if: steps.changes.outputs.no_changes == 'true'
        run: echo "No new posts to commit today."
